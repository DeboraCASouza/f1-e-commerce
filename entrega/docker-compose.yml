version: "3.8"

services:
  users:
    build: ./users
    ports:
      - "5001:5001"
    environment:
      - JWT_SECRET=super-secret-jwt-key-change-me
      - DATA_FILE=data/users.json
      - PORT=5001
    volumes:
      - users_data:/app/data

  products_1:
    build: ./products
    ports:
      - "5002:5002"
    environment:
      - JWT_SECRET=super-secret-jwt-key-change-me
      - DATA_FILE=data/products.json
      - PORT=5002
    volumes:
      - products_1_data:/app/data

  products_2:
    build: ./products
    ports:
      - "5012:5012"
    environment:
      - JWT_SECRET=super-secret-jwt-key-change-me
      - DATA_FILE=data/products.json
      - PORT=5012
    volumes:
      - products_2_data:/app/data

  orders:
    build: ./orders
    ports:
      - "5003:5003"
    environment:
      - JWT_SECRET=super-secret-jwt-key-change-me
      - DATA_FILE=data/orders.json
      - PORT=5003
    volumes:
      - orders_data:/app/data

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    environment:
      - USERS_URL=http://users:5001
      - PRODUCTS_1_URL=http://products_1:5002
      - PRODUCTS_2_URL=http://products_2:5012
      - ORDERS_URL=http://orders:5003
      - HEARTBEAT_INTERVAL=5
      - PORT=8000
    depends_on:
      - users
      - products_1
      - products_2
      - orders

volumes:
  users_data:
  products_1_data:
  products_2_data:
  orders_data:
